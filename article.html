<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Article — VALENTIN V.</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-orange:  #FF6B00;
            --logo-pink:    #FF1A8C;
            --logo-yellow:  #FFD700;
            --logo-cyan:    #00CFFF;
            --logo-lime:    #AAFF00;
            --logo-purple:  #9B00FF;
            --glass-bg:           rgba(255,255,255,0.18);
            --glass-bg-dark:      rgba(255,255,255,0.07);
            --glass-border:       rgba(255,255,255,0.5);
            --glass-border-dark:  rgba(255,255,255,0.15);
            --glass-blur:         saturate(180%) blur(20px);
            --glass-shadow:       0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
            --glass-shadow-dark:  0 8px 40px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f5f5f7;
            color: #111;
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color .5s ease, color .5s ease;
        }
        body.dark-mode { background-color: #080810; color: #e8e8f0; }

        /* ── BARRE DE LECTURE ── */
        .progress-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            z-index: 2000; background: transparent;
        }
        .progress-bar {
            height: 100%; width: 0%;
            background: #FF69B4;
            border-radius: 0 3px 3px 0;
            box-shadow: 0 0 10px rgba(255,105,180,0.5);
            transition: width .12s linear;
        }

        /* ── NAV ── */
        nav {
            position: sticky; top: 0; z-index: 1000;
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 max(5%, env(safe-area-inset-left));
            height: 100px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1.5px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            transition: background .4s, border-color .4s;
        }
        body.dark-mode nav {
            background: var(--glass-bg-dark);
            border-bottom-color: var(--glass-border-dark);
            box-shadow: var(--glass-shadow-dark);
        }
        .nav-logo { height: 75px; width: auto; display: block; margin: 0 auto; filter: drop-shadow(4px 4px 0 #000); transition: .3s; }
        .nav-left  { display: flex; justify-content: flex-start; align-items: center; }
        .nav-right { display: flex; justify-content: flex-end; align-items: center; }

        .back-btn {
            font-family: 'Poppins', sans-serif;
            font-weight: 900; font-size: .72rem;
            text-transform: uppercase; letter-spacing: .1em;
            text-decoration: none; color: rgba(0,0,0,0.75);
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid rgba(0,0,0,0.2);
            background: transparent;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            transition: transform .2s var(--ease-spring), box-shadow .2s, background .2s, color .2s, border-color .2s;
            white-space: nowrap;
        }
        .back-btn:hover {
            color: #fff; background: var(--logo-orange); border-color: var(--logo-orange);
            box-shadow: 0 6px 24px rgba(255,107,0,0.55); transform: translateY(-2px) scale(1.04);
        }
        body.dark-mode .back-btn { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.25); }
        body.dark-mode .back-btn:hover { color: #fff; background: var(--logo-orange); border-color: var(--logo-orange); box-shadow: 0 6px 24px rgba(255,107,0,0.5); }

        .dark-btn {
            font-family: 'Poppins', sans-serif; font-weight: 900; font-size: .85rem;
            text-transform: uppercase; letter-spacing: .03em;
            padding: 10px 22px;
            background: rgba(0,0,0,0.85); color: #fff;
            border: 1.5px solid rgba(255,255,255,0.25); border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
            cursor: pointer; backdrop-filter: blur(10px);
            transition: transform .2s var(--ease-spring), box-shadow .2s, background .2s;
        }
        .dark-btn:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 28px rgba(255,107,0,0.4); background: var(--logo-orange); }
        body.dark-mode .dark-btn { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.2); }
        body.dark-mode .dark-btn:hover { background: var(--logo-yellow); color: #000; box-shadow: 0 8px 28px rgba(255,215,0,0.4); }

        /* ── HERO ── */
        .article-hero {
            position: relative; width: 100%; height: 75vh; min-height: 550px;
            display: flex; align-items: flex-end; padding-bottom: 80px; overflow: hidden;
        }
        .hero-bg {
            position: absolute; inset: 0;
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=2000') center/cover;
            z-index: 1; filter: brightness(0.8); transition: transform 8s ease;
        }
        .article-hero:hover .hero-bg { transform: scale(1.02); }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
            z-index: 2;
        }
        .hero-content { position: relative; z-index: 10; width: 90%; max-width: 1100px; margin: 0 auto; }

        .category-sticker {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,215,0,0.9); color: #000;
            padding: 8px 20px; font-weight: 900; text-transform: uppercase;
            font-size: .85rem; letter-spacing: .1em; border-radius: 50px;
            border: 1.5px solid rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(255,215,0,0.4), inset 0 1px 0 rgba(255,255,255,0.5);
            margin-bottom: 20px; cursor: default;
            transition: transform .2s var(--ease-spring), box-shadow .2s, background .2s, color .2s;
        }
        .category-sticker:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 30px rgba(255,26,140,0.5); background: var(--logo-pink); color: #fff; }

        .article-title {
            font-size: clamp(2.2rem, 7vw, 5rem); font-weight: 900; line-height: 1;
            color: #fff; text-transform: uppercase; margin: 0;
            text-shadow: 0 2px 20px rgba(0,0,0,0.6), 0 8px 40px rgba(0,0,0,0.4);
            letter-spacing: -.01em;
        }

        /* ── SKELETON HERO ── */
        @keyframes shimmer { 0% { background-position: -800px 0; } 100% { background-position: 800px 0; } }
        .hero-skeleton-pill {
            height: 36px; width: 140px; border-radius: 50px; margin-bottom: 20px;
            background: linear-gradient(90deg, rgba(255,255,255,0.15) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.15) 75%);
            background-size: 800px 100%; animation: shimmer 1.4s infinite linear;
        }
        .hero-skeleton-title {
            height: 60px; width: 75%; border-radius: 12px; margin-bottom: 12px;
            background: linear-gradient(90deg, rgba(255,255,255,0.2) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.2) 75%);
            background-size: 800px 100%; animation: shimmer 1.4s infinite linear;
        }
        .hero-skeleton-title.short { width: 50%; }

        /* ── CORPS ── */
        .article-container { max-width: 860px; margin: 60px auto; padding: 0 30px; }

        .meta-info {
            display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 50px;
            padding: 20px 28px;
            background: rgba(255,255,255,0.65);
            border: 1.5px solid rgba(255,255,255,0.7); border-radius: 20px;
            backdrop-filter: saturate(180%) blur(16px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
            font-weight: 700; font-size: .9rem;
        }
        body.dark-mode .meta-info {
            background: rgba(30,30,50,0.6); border-color: rgba(255,255,255,0.1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .meta-info span { display: flex; align-items: center; gap: 8px; }

        /* ── SKELETON BODY ── */
        .skeleton-meta {
            height: 70px; border-radius: 20px; margin-bottom: 50px;
            background: linear-gradient(90deg, rgba(0,0,0,.06) 25%, rgba(0,0,0,.02) 50%, rgba(0,0,0,.06) 75%);
            background-size: 800px 100%; animation: shimmer 1.4s infinite linear;
        }
        body.dark-mode .skeleton-meta { background: linear-gradient(90deg, rgba(255,255,255,.06) 25%, rgba(255,255,255,.02) 50%, rgba(255,255,255,.06) 75%); background-size: 800px 100%; }
        .skeleton-line { border-radius: 8px; margin-bottom: 18px;
            background: linear-gradient(90deg, rgba(0,0,0,.08) 25%, rgba(0,0,0,.03) 50%, rgba(0,0,0,.08) 75%);
            background-size: 800px 100%; animation: shimmer 1.4s infinite linear;
        }
        body.dark-mode .skeleton-line { background: linear-gradient(90deg, rgba(255,255,255,.08) 25%, rgba(255,255,255,.03) 50%, rgba(255,255,255,.08) 75%); background-size: 800px 100%; }
        .skeleton-line.h1  { height: 28px; width: 95%; }
        .skeleton-line.h2  { height: 28px; width: 80%; }
        .skeleton-line.h3  { height: 28px; width: 60%; margin-bottom: 40px; }
        .skeleton-line.ht  { height: 36px; width: 50%; margin: 40px 0 16px; border-radius: 12px; }

        /* ── ERREUR ── */
        .error-box {
            text-align: center; padding: 80px 20px;
            font-weight: 900; font-size: 1.2rem; text-transform: uppercase;
            color: var(--logo-pink); opacity: .7;
        }

        .article-body p { font-size: 1.25rem; margin-bottom: 2.2rem; line-height: 1.75; }
        .article-body p:first-of-type::first-letter {
            float: left; font-size: 6rem; line-height: 0.75; font-weight: 900;
            padding: 16px 16px 0 0; color: var(--logo-orange);
            text-shadow: 4px 4px 0 rgba(255,107,0,0.2);
        }
        .article-body h2 {
            font-size: 1.9rem; font-weight: 900; text-transform: uppercase;
            margin: 55px 0 18px; display: inline-block;
            background: rgba(0,0,0,0.88); color: #fff;
            padding: 8px 22px; border-radius: 12px; transform: rotate(-.5deg);
            box-shadow: 6px 6px 0 var(--logo-cyan);
        }
        body.dark-mode .article-body h2 { background: rgba(255,255,255,0.9); color: #000; }
        .article-body h3 {
            font-size: 1.4rem; font-weight: 900; text-transform: uppercase;
            margin: 40px 0 12px; color: var(--logo-purple);
        }
        body.dark-mode .article-body h3 { color: var(--logo-cyan); }

        /* ── BLOCKQUOTE ── */
        .blockquote-wrapper { margin: 72px 0; position: relative; }
        blockquote {
            margin: 0; padding: 52px 52px 44px 52px; position: relative; z-index: 1;
            background: #fff; border: 2px solid rgba(255,107,0,0.18); border-radius: 28px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.07), 0 8px 24px rgba(255,107,0,0.08), inset 0 1px 0 rgba(255,255,255,1);
            font-size: 1.45rem; font-weight: 800; line-height: 1.65;
            font-style: normal; color: #161616; overflow: visible;
            transition: transform .3s var(--ease-spring), box-shadow .3s ease, border-color .3s ease;
        }
        blockquote::before {
            content: '\201C'; position: absolute; top: 10px; left: 36px;
            font-size: 7rem; line-height: 1; font-weight: 900;
            color: var(--logo-orange); opacity: 0.22; pointer-events: none; user-select: none;
            font-family: Georgia, 'Times New Roman', serif;
        }
        .blockquote-wrapper:hover blockquote {
            transform: translateY(-4px); border-color: rgba(255,107,0,0.35);
            box-shadow: 0 32px 100px rgba(0,0,0,0.1), 0 12px 36px rgba(255,107,0,0.14);
        }
        .bq-text { position: relative; z-index: 1; display: block; }
        .bq-source {
            display: block; margin-top: 18px; font-size: .82rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: .12em;
            color: var(--logo-orange); opacity: 0.75;
        }
        body.dark-mode blockquote {
            background: rgba(22,16,8,0.95); border-color: rgba(255,107,0,0.22);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 8px 24px rgba(255,107,0,0.08), inset 0 1px 0 rgba(255,255,255,0.04);
            color: #f9f9ff;
        }
        body.dark-mode blockquote::before { opacity: 0.18; }
        body.dark-mode .bq-source { color: var(--logo-orange); opacity: 0.65; }

        /* ── SHARE BOX ── */
        .share-box {
            margin: 80px auto; padding: 50px 40px;
            background: rgba(255,255,255,0.65);
            border: 1.5px solid rgba(255,255,255,0.7); border-radius: 28px;
            text-align: center; backdrop-filter: saturate(180%) blur(20px);
            box-shadow: 0 16px 60px rgba(255,26,140,0.1), 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
            position: relative; overflow: hidden;
        }
        .share-box::before {
            content: ''; position: absolute; right: -60px; top: -60px;
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,26,140,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        body.dark-mode .share-box {
            background: rgba(30,30,50,0.6); border-color: rgba(255,255,255,0.1);
            box-shadow: 0 16px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .share-box h2 {
            font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin: 0 0 28px;
            background: linear-gradient(90deg, var(--logo-orange), var(--logo-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .share-grid { display: flex; justify-content: center; gap: 16px; flex-wrap: nowrap; max-width: 680px; margin: 0 auto; }
        .share-btn {
            font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 1rem;
            text-transform: uppercase; letter-spacing: .04em;
            padding: 14px 20px; border-radius: 50px; flex: 1;
            border: 1.5px solid rgba(255,255,255,0.35);
            text-decoration: none; cursor: pointer; backdrop-filter: blur(8px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            white-space: nowrap; position: relative; overflow: hidden;
            transition: box-shadow .25s, filter .2s, transform .25s var(--ease-spring);
        }
        .share-btn:hover { filter: brightness(1.12) saturate(1.25); transform: translateY(-3px) scale(1.04); }
        .share-btn:active { filter: brightness(0.95); transform: scale(0.97); transition-duration: .08s; }
        .s-x  { background: rgba(0,0,0,0.88); color: #fff; }
        .s-x:hover  { box-shadow: 0 12px 36px rgba(0,0,0,0.4); }
        .s-fb { background: rgba(24,119,242,0.92); color: #fff; }
        .s-fb:hover { box-shadow: 0 12px 36px rgba(24,119,242,0.5); }
        .s-link { background: linear-gradient(135deg, var(--logo-orange), var(--logo-pink)); color: #fff; border-color: rgba(255,255,255,0.35); }
        .s-link:hover { box-shadow: 0 12px 36px rgba(255,26,140,0.45); }

        @keyframes burst { 0% { opacity:.7; transform:scale(0); } 70% { opacity:.4; transform:scale(1.8); } 100% { opacity:0; transform:scale(2.4); } }
        .copy-burst { position:absolute; inset:0; border-radius:50px; background:rgba(255,255,255,0.4); pointer-events:none; transform:scale(0); opacity:0; }
        .copy-burst.animate { animation: burst .5s var(--ease-out) forwards; }
        #copyText { pointer-events:none; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:900; letter-spacing:.04em; white-space:nowrap; transition:opacity .22s ease, transform .22s var(--ease-out); }
        #copyText.hide { opacity:0; transform:translateY(-6px); }
        .s-link.copied { background: linear-gradient(135deg,#0db860,#00cfaa); box-shadow:0 12px 36px rgba(13,184,96,0.45); }

        /* ── SCROLL REVEAL ── */
        .reveal { opacity:0; transform:translateY(32px); transition:opacity .65s var(--ease-out), transform .65s var(--ease-out); }
        .reveal.visible { opacity:1; transform:translateY(0); }

        /* ── RESPONSIVE ── */
        @media (max-width: 1024px) {
            .article-container { max-width: 720px; padding: 0 24px; }
            blockquote { font-size: 1.3rem; padding: 44px 44px 36px 52px; }
        }
        @media (max-width: 768px) {
            nav { height: 68px; padding: 0 16px; grid-template-columns: auto 1fr auto; }
            .nav-logo { height: 48px; }
            .back-btn { font-size: .7rem; padding: 8px 14px; }
            .dark-btn { font-size: .72rem; padding: 8px 14px; }
            .article-hero { height: 52vh; min-height: 300px; padding-bottom: 36px; }
            .hero-content { width: 92%; }
            .article-title { font-size: clamp(1.7rem, 5.5vw, 3rem); }
            .category-sticker { font-size: .78rem; padding: 7px 16px; margin-bottom: 14px; }
            .article-container { padding: 0 24px; margin: 36px auto; }
            .meta-info { padding: 14px 18px; gap: 10px; font-size: .8rem; border-radius: 16px; flex-direction: column; margin-bottom: 36px; }
            .article-body p { font-size: 1.08rem; margin-bottom: 1.7rem; line-height: 1.7; }
            .article-body p:first-of-type::first-letter { font-size: 5rem; padding: 12px 12px 0 0; }
            .article-body h2 { font-size: 1.5rem; padding: 7px 18px; box-shadow: 4px 4px 0 var(--logo-cyan); }
            .article-body h3 { font-size: 1.2rem; margin: 32px 0 10px; }
            .blockquote-wrapper { margin: 48px 0; }
            blockquote { font-size: 1.18rem; padding: 40px 32px 32px 44px; border-radius: 20px; }
            .share-box { padding: 32px 20px; border-radius: 20px; margin: 50px auto; }
            .share-box h2 { font-size: 1.3rem; margin-bottom: 20px; }
            .share-grid { flex-direction: column; gap: 10px; align-items: stretch; max-width: 380px; margin: 0 auto; }
            .share-btn { flex: unset; width: 100%; padding: 14px 20px; font-size: .92rem; }
        }
        @media (max-width: 480px) {
            nav { height: 58px; padding: 0 12px; }
            .nav-logo { height: 38px; }
            .back-btn { font-size: .65rem; padding: 7px 12px; gap: 4px; }
            .dark-btn { font-size: .68rem; padding: 7px 12px; }
            .progress-container { height: 3px; }
            .article-hero { height: 46vh; min-height: 250px; padding-bottom: 24px; }
            .hero-content { width: 94%; }
            .article-title { font-size: clamp(1.35rem, 6.5vw, 2.1rem); letter-spacing: -.02em; line-height: 1.05; }
            .hero-skeleton-title { height: 40px; }
            .category-sticker { font-size: .7rem; padding: 5px 13px; margin-bottom: 10px; }
            .article-container { padding: 0 14px; margin: 24px auto; }
            .meta-info { padding: 12px 14px; gap: 8px; font-size: .75rem; border-radius: 14px; margin-bottom: 28px; flex-direction: column; }
            .article-body p { font-size: .97rem; margin-bottom: 1.4rem; line-height: 1.68; }
            .article-body p:first-of-type::first-letter { font-size: 4rem; line-height: .78; padding: 8px 10px 0 0; }
            .article-body h2 { font-size: 1.15rem; padding: 6px 14px; box-shadow: 3px 3px 0 var(--logo-cyan); margin: 40px 0 12px; transform: none; }
            .article-body h3 { font-size: 1.05rem; margin: 26px 0 8px; }
            .blockquote-wrapper { margin: 36px 0; }
            blockquote { font-size: 1rem; line-height: 1.65; padding: 44px 20px 24px 32px; border-radius: 18px; font-weight: 700; }
            blockquote::before { font-size: 5rem; top: 6px; left: 20px; }
            .bq-source { font-size: .74rem; }
            .share-box { margin: 36px auto; padding: 24px 14px; border-radius: 16px; }
            .share-box h2 { font-size: 1.1rem; margin-bottom: 16px; }
            .share-grid { flex-direction: column; gap: 10px; align-items: stretch; max-width: 100%; }
            .share-btn { flex: unset; padding: 14px 20px; font-size: .84rem; justify-content: center; border-radius: 50px; width: 100%; }
        }
        @media (max-width: 360px) {
            .article-title { font-size: clamp(1.15rem, 7vw, 1.6rem); }
            .article-body p { font-size: .92rem; }
            blockquote { font-size: .95rem; padding: 42px 14px 18px 28px; }
            .share-btn { font-size: .79rem; padding: 13px 16px; }
        }
    </style>
</head>
<body>

<div class="progress-container">
    <div class="progress-bar" id="readingProgress"></div>
</div>

<nav>
    <div class="nav-left">
        <a href="https://dignmedia.github.io" class="back-btn"><span>←</span><span>Accueil</span></a>
    </div>
    <div class="nav-center" style="display:flex;justify-content:center;align-items:center;">
        <a href="https://dignmedia.github.io"><img src="logo-valentin.png" alt="VALENTIN V." class="nav-logo"></a>
    </div>
    <div class="nav-right">
        <button class="dark-btn" id="dark-toggle">Mode Sombre</button>
    </div>
</nav>

<header class="article-hero" id="articleHero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content" id="heroContent">
        <!-- Skeleton pendant le chargement -->
        <div class="hero-skeleton-pill" id="skPill"></div>
        <div class="hero-skeleton-title" id="skTitle1"></div>

        <div class="skeleton-line ht"></div>

    <section class="share-box reveal" id="shareBox" style="display:none;">

            </a>
            <a href="#" id="shareFB" target="_blank" rel="noopener noreferrer" class="share-btn s-fb">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook
            </a>
            <button onclick="copyLink()" id="copyBtn" class="share-btn s-link" aria-label="Copier le lien">
                <div class="copy-burst" id="copyBurst"></div>
                <span id="copyText">Copier le lien</span>
            </button>

<footer id="pageFooter" style="display:none;
    margin-top: 0; padding: 40px max(5%, env(safe-area-inset-left));

        © 2026 dign.média — Tous droits réservés.
    </p>
</footer>

<style>
body.dark-mode footer { background: rgba(10,8,20,0.7) !important; border-top-color: rgba(255,255,255,0.08) !important; }
body.dark-mode footer p { color: rgba(255,255,255,0.28) !important; }
body.dark-mode #footerBrand { color: #fff !important; }
</style>

<script>
(function () {
    /* ── CONFIG SANITY (même projet que index.html) ── */
    var PROJECT_ID = 'jf7j0hvz';
    var DATASET    = 'production';
    var API_VER    = 'v2021-10-21';

    /* ── DARK MODE ── */
    var darkBtn = document.getElementById('dark-toggle');
    darkBtn.addEventListener('click', function () {
        document.body.classList.toggle('dark-mode');
        darkBtn.textContent = document.body.classList.contains('dark-mode') ? 'Mode Clair' : 'Mode Sombre';
    });

    /* ── BARRE DE LECTURE ── */
    window.addEventListener('scroll', function () {
        var s = document.body.scrollTop || document.documentElement.scrollTop;
        var h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById('readingProgress').style.width = (h > 0 ? (s / h * 100) : 0) + '%';
    });

    /* ── RÉCUPÉRER LE SLUG DANS L'URL ── */
    var params = new URLSearchParams(window.location.search);
    var slug   = params.get('s') || params.get('slug');

    if (!slug) {
        showError('Aucun article spécifié. <a href="https://dignmedia.github.io" style="color:var(--logo-orange)">Retour à l\'accueil</a>');
        return;
    }

    /* ── QUERY GROQ ── */
    // On récupère tous les champs utiles selon ton schéma Sanity
    var query = encodeURIComponent(
        '*[_type == "post" && slug.current == "' + slug + '"][0]{'
      + '  title,'
      + '  slug,'
      + '  publishedAt,'
      + '  "imageUrl": mainImage.asset->url,'
      + '  "authorName": author->name,'
      + '  "categoryTitle": categories[0]->title,'
      + '  body'
      + '}'
    );

    var API_URL = 'https://' + PROJECT_ID + '.api.sanity.io/' + API_VER + '/data/query/' + DATASET + '?query=' + query;

    fetch(API_URL)
        .then(function (res) { return res.json(); })
        .then(function (data) {
            var article = data.result;
            if (!article) {
                showError('Article introuvable. <a href="https://dignmedia.github.io" style="color:var(--logo-orange)">Retour à l\'accueil</a>');
                return;
            }
            renderArticle(article);
        })
        .catch(function (err) {
            console.error('Sanity fetch error:', err);
            showError('Impossible de charger l\'article.');
        });

    /* ── RENDU ── */
    function renderArticle(a) {
        // Titre de l'onglet
        document.title = (a.title || 'Article') + ' — VALENTIN V.';

        // Hero image
        var heroBg = document.getElementById('heroBg');
        if (a.imageUrl) {
            heroBg.style.backgroundImage = "url('" + a.imageUrl + "')";
        }

        // Hero content (remplace les skeletons)
        var heroContent = document.getElementById('heroContent');
        var catLabel = a.categoryTitle || 'Article';
        heroContent.innerHTML =
            '<div class="category-sticker">' + escHTML(catLabel) + '</div>'
          + '<h1 class="article-title">' + escHTML(a.title || 'Sans titre') + '</h1>';

        // Meta
        var metaWrapper = document.getElementById('metaWrapper');
        var dateStr = formatDate(a.publishedAt);
        var authorStr = a.authorName ? '✍️ Par ' + escHTML(a.authorName) : '✍️ Par Valentin V.';
        var readTime = estimateReadTime(a.body);
        metaWrapper.innerHTML =
            '<div class="meta-info reveal">'
          + '<span>' + authorStr + '</span>'
          + (dateStr ? '<span>📅 ' + dateStr + '</span>' : '')
          + '<span>⏱️ ' + readTime + ' min de lecture</span>'
          + '</div>';

        // Contenu de l'article
        var artContent = document.getElementById('artContent');
        artContent.innerHTML = renderBody(a.body);

        // Share box + footer
        document.getElementById('shareBox').style.display = '';
        document.getElementById('pageFooter').style.display = '';

        // Partage social
        var url   = encodeURIComponent(window.location.href);
        var title = encodeURIComponent(a.title || '');
        document.getElementById('shareX').href  = 'https://twitter.com/intent/tweet?text=' + title + '&url=' + url;
        document.getElementById('shareFB').href = 'https://www.facebook.com/sharer/sharer.php?u=' + url;

        // Scroll reveal
        initReveal();
    }

    /* ── PORTABLE TEXT → HTML (champs body Sanity) ── */
    function renderBody(blocks) {
        if (!blocks || !Array.isArray(blocks)) return '<p>Contenu indisponible.</p>';
        return blocks.map(function (block) {
            if (block._type === 'block') {
                var style = block.style || 'normal';
                var inner = renderSpans(block.children || []);
                if (style === 'h2') return '<h2>' + inner + '</h2>';
                if (style === 'h3') return '<h3>' + inner + '</h3>';
                if (style === 'blockquote') {
                    return '<div class="blockquote-wrapper"><blockquote><span class="bq-text">' + inner + '</span></blockquote></div>';
                }
                return '<p>' + inner + '</p>';
            }
            // Images inline
            if (block._type === 'image' && block.asset && block.asset.url) {
                return '<img src="' + block.asset.url + '" style="width:100%;border-radius:18px;margin:32px 0;" alt="" loading="lazy">';
            }
            return '';
        }).join('');
    }

    function renderSpans(spans) {
        return spans.map(function (span) {
            if (!span.text) return '';
            var text = escHTML(span.text);
            var marks = span.marks || [];
            if (marks.indexOf('strong') !== -1) text = '<strong>' + text + '</strong>';
            if (marks.indexOf('em') !== -1) text = '<em>' + text + '</em>';
            if (marks.indexOf('underline') !== -1) text = '<u>' + text + '</u>';
            return text;
        }).join('');
    }

    /* ── HELPERS ── */
    function escHTML(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        try {
            return new Date(dateStr).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        } catch(e) { return ''; }
    }

    function estimateReadTime(blocks) {
        if (!blocks || !Array.isArray(blocks)) return 2;
        var words = blocks.reduce(function (acc, b) {
            if (b._type === 'block' && b.children) {
                return acc + b.children.reduce(function (a, s) { return a + (s.text ? s.text.split(/\s+/).length : 0); }, 0);
            }
            return acc;
        }, 0);
        return Math.max(1, Math.ceil(words / 200));
    }

    function showError(msg) {
        // Retire skeletons
        document.getElementById('heroContent').innerHTML = '<h1 class="article-title" style="font-size:2rem;">Article non trouvé</h1>';
        document.getElementById('metaWrapper').innerHTML = '';
        document.getElementById('artContent').innerHTML = '<div class="error-box">' + msg + '</div>';
        document.getElementById('pageFooter').style.display = '';
    }

    /* ── SCROLL REVEAL ── */
    function initReveal() {
        var els = document.querySelectorAll('.reveal');
        if (!('IntersectionObserver' in window)) { els.forEach(function(el){ el.classList.add('visible'); }); return; }
        var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); }
            });
        }, { threshold: 0.12 });
        els.forEach(function(el){ observer.observe(el); });
    }

    /* ── COPIER LE LIEN ── */
    var copyTimeout = null;
    window.copyLink = function () {
        var btn      = document.getElementById('copyBtn');
        var burst    = document.getElementById('copyBurst');
        var copyText = document.getElementById('copyText');
        if (btn.classList.contains('copied')) return;

        var doAnimate = function () {
            burst.classList.remove('animate'); void burst.offsetWidth; burst.classList.add('animate');
            copyText.classList.add('hide');
            setTimeout(function () {
                btn.classList.add('copied');
                copyText.textContent = 'COPIÉ ! ✅';
                copyText.style.transform = 'translateY(6px)'; copyText.style.opacity = '0';
                void copyText.offsetWidth;
                copyText.classList.remove('hide'); copyText.style.transform = ''; copyText.style.opacity = '';
            }, 220);
            clearTimeout(copyTimeout);
            copyTimeout = setTimeout(function () {
                copyText.classList.add('hide');
                setTimeout(function () {
                    btn.classList.remove('copied'); copyText.textContent = 'Copier le lien';
                    copyText.style.transform = 'translateY(6px)'; copyText.style.opacity = '0';
                    void copyText.offsetWidth;
                    copyText.classList.remove('hide'); copyText.style.transform = ''; copyText.style.opacity = '';
                }, 220);
            }, 2500);
        };

        navigator.clipboard.writeText(window.location.href).then(doAnimate).catch(function () {
            var ta = document.createElement('textarea');
            ta.value = window.location.href; document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta); doAnimate();
        });
    };
}());
</script>
</body>
